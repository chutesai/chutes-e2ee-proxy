name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint + Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pytest-asyncio ruff

      - name: Ruff
        run: ruff check src tests

      - name: Installer logic check (mocked)
        run: pytest -q tests/test_install_sh.py

      - name: Pytest
        run: pytest -q --ignore=tests/test_install_sh.py

  smoke-cross-platform:
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: CLI help smoke
        run: |
          chutes-e2ee-proxy --help
          chutes-e2ee-proxy serve --help
          chutes-e2ee-proxy doctor --help

      - name: Validate shell scripts (unix)
        if: runner.os != 'Windows'
        run: |
          bash -n install
          bash -n install.sh

      - name: Validate PowerShell script (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          [void][ScriptBlock]::Create((Get-Content -Raw -Path "install.ps1"))
